apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-rolling
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aceest-rolling
  template:
    metadata:
      labels:
        app: aceest-rolling
    spec:
      containers:
        - name: aceest-fitness
          image: gokulggowdabits/aceest-fitness:v1.0
          ports:
            - containerPort: 5000
          imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-rolling-service
spec:
  type: NodePort
  selector:
    app: aceest-rolling
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30081
