apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-version-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-ab
      version: a
  template:
    metadata:
      labels:
        app: aceest-ab
        version: a
    spec:
      containers:
        - name: aceest-fitness
          image: gokulggowdabits/aceest-fitness:v1.0
          ports:
            - containerPort: 5000
          imagePullPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-version-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-ab
      version: b
  template:
    metadata:
      labels:
        app: aceest-ab
        version: b
    spec:
      containers:
        - name: aceest-fitness
          image: gokulggowdabits/aceest-fitness:v2.0
          ports:
            - containerPort: 5000
          imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-ab-service-a
spec:
  type: NodePort
  selector:
    app: aceest-ab
    version: a
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30084
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-ab-service-b
spec:
  type: NodePort
  selector:
    app: aceest-ab
    version: b
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30085
