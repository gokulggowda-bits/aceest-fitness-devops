apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-canary
      track: stable
  template:
    metadata:
      labels:
        app: aceest-canary
        track: stable
    spec:
      containers:
        - name: aceest-fitness
          image: gokulggowdabits/aceest-fitness:v1.0
          ports:
            - containerPort: 5000
          imagePullPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-canary
      track: canary
  template:
    metadata:
      labels:
        app: aceest-canary
        track: canary
    spec:
      containers:
        - name: aceest-fitness
          image: gokulggowdabits/aceest-fitness:v2.0
          ports:
            - containerPort: 5000
          imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-canary-service
spec:
  type: NodePort
  selector:
    app: aceest-canary
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30083
