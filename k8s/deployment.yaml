apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness
  labels:
    app: aceest-fitness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
  template:
    metadata:
      labels:
        app: aceest-fitness
    spec:
      containers:
        - name: aceest-fitness
          image: gokulggowdabits/aceest-fitness:v2.0
          ports:
            - containerPort: 5000
          imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-service
spec:
  type: NodePort
  selector:
    app: aceest-fitness
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30080
